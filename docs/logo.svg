<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Blueprint grid pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a3a5c" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <!-- Gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#d49420"/>
    </linearGradient>

    <linearGradient id="cyanGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Compass clip -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="220"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1a3a5c" stroke-width="2"/>

  <!-- Blueprint grid -->
  <g clip-path="url(#circleClip)" opacity="0.4">
    <rect x="36" y="36" width="440" height="440" fill="url(#grid)"/>
  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1a4a6a" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="#1a4a6a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>

  <!-- Tick marks on outer ring (like a compass rose) -->
  <g stroke="#1a4a6a" stroke-width="1" opacity="0.6">
    <!-- Major ticks (every 30 degrees) -->
    <line x1="256" y1="36" x2="256" y2="56"/>
    <line x1="376" y1="82" x2="366" y2="96"/>
    <line x1="456" y1="136" x2="440" y2="146"/>
    <line x1="476" y1="256" x2="456" y2="256"/>
    <line x1="456" y1="376" x2="440" y2="366"/>
    <line x1="376" y1="430" x2="366" y2="416"/>
    <line x1="256" y1="476" x2="256" y2="456"/>
    <line x1="136" y1="430" x2="146" y2="416"/>
    <line x1="56" y1="376" x2="72" y2="366"/>
    <line x1="36" y1="256" x2="56" y2="256"/>
    <line x1="56" y1="136" x2="72" y2="146"/>
    <line x1="136" y1="82" x2="146" y2="96"/>
  </g>

  <!-- ===== DRAFTING COMPASS / ARCHITECTURAL COMPASS ===== -->

  <!-- Left leg of the compass -->
  <g filter="url(#softGlow)">
    <line x1="256" y1="140" x2="156" y2="370" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Right leg of the compass -->
  <g filter="url(#softGlow)">
    <line x1="256" y1="140" x2="356" y2="370" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Compass legs with blueprint line style -->
  <line x1="256" y1="140" x2="156" y2="370" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="140" x2="356" y2="370" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Pivot joint at top (compass hinge) -->
  <circle cx="256" cy="140" r="12" fill="#0a1628" stroke="url(#accentGrad)" stroke-width="2.5"/>
  <circle cx="256" cy="140" r="5" fill="url(#accentGrad)"/>

  <!-- Compass pencil/needle tip (left) -->
  <circle cx="156" cy="370" r="3" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- Compass pencil/needle tip (right) -->
  <circle cx="356" cy="370" r="3" fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- ===== BLUEPRINT DRAWING LINES (inside compass) ===== -->

  <!-- Floor plan lines -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.4" fill="none">
    <!-- Horizontal structural lines -->
    <line x1="190" y1="260" x2="322" y2="260"/>
    <line x1="190" y1="300" x2="322" y2="300"/>
    <line x1="190" y1="340" x2="322" y2="340"/>

    <!-- Vertical structural lines -->
    <line x1="220" y1="240" x2="220" y2="360"/>
    <line x1="256" y1="220" x2="256" y2="360"/>
    <line x1="292" y1="240" x2="292" y2="360"/>

    <!-- Diagonal accent -->
    <line x1="190" y1="260" x2="256" y2="200" stroke-dasharray="3 3"/>
    <line x1="322" y1="260" x2="256" y2="200" stroke-dasharray="3 3"/>
  </g>

  <!-- ===== AI NEURAL NODES (flow nodes on blueprint) ===== -->

  <!-- Node 1 (top left) -->
  <g filter="url(#glow)">
    <circle cx="208" cy="248" r="8" fill="#0a1628" stroke="url(#accentGrad)" stroke-width="2"/>
    <circle cx="208" cy="248" r="3" fill="url(#accentGrad)"/>
  </g>

  <!-- Node 2 (top right) -->
  <g filter="url(#glow)">
    <circle cx="304" cy="248" r="8" fill="#0a1628" stroke="url(#accentGrad)" stroke-width="2"/>
    <circle cx="304" cy="248" r="3" fill="url(#accentGrad)"/>
  </g>

  <!-- Node 3 (center) -->
  <g filter="url(#softGlow)">
    <circle cx="256" cy="290" r="14" fill="#0a1628" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <circle cx="256" cy="290" r="5" fill="url(#goldGrad)"/>
  </g>

  <!-- Node 4 (bottom left) -->
  <g filter="url(#glow)">
    <circle cx="208" cy="340" r="8" fill="#0a1628" stroke="url(#accentGrad)" stroke-width="2"/>
    <circle cx="208" cy="340" r="3" fill="url(#accentGrad)"/>
  </g>

  <!-- Node 5 (bottom right) -->
  <g filter="url(#glow)">
    <circle cx="304" cy="340" r="8" fill="#0a1628" stroke="url(#accentGrad)" stroke-width="2"/>
    <circle cx="304" cy="340" r="3" fill="url(#accentGrad)"/>
  </g>

  <!-- Connection lines between nodes (data flow) -->
  <g stroke="#00d4ff" stroke-width="1" opacity="0.5" fill="none">
    <path d="M216,248 Q236,260 242,290" stroke-dasharray="3 3"/>
    <path d="M296,248 Q276,260 270,290" stroke-dasharray="3 3"/>
    <path d="M216,340 Q236,320 242,290" stroke-dasharray="3 3"/>
    <path d="M296,340 Q276,320 270,290" stroke-dasharray="3 3"/>
    <path d="M208,256 L208,332" stroke-dasharray="2 4" opacity="0.3"/>
    <path d="M304,256 L304,332" stroke-dasharray="2 4" opacity="0.3"/>
  </g>

  <!-- ===== FLOW ARROWS (direction indicators) ===== -->

  <g fill="#00d4ff" opacity="0.5">
    <!-- Arrow pointing into center node -->
    <polygon points="246,286 250,290 246,294"/>
    <polygon points="266,286 262,290 266,294"/>
    <polygon points="246,286 250,290 246,294" transform="rotate(90 250 290)"/>
  </g>

  <!-- ===== INNER BLUEPRINT BORDER ===== -->

  <rect x="182" y="220" width="148" height="160" rx="4" fill="none" stroke="#1a4a6a" stroke-width="0.75" stroke-dasharray="6 3" opacity="0.4"/>

  <!-- ===== DIMENSION LINES (architectural annotations) ===== -->

  <g stroke="#1a4a6a" stroke-width="0.5" opacity="0.3">
    <!-- Top dimension -->
    <line x1="180" y1="185" x2="332" y2="185"/>
    <line x1="180" y1="180" x2="180" y2="190"/>
    <line x1="332" y1="180" x2="332" y2="190"/>
    <polygon points="180,185 188,182 188,188" fill="#1a4a6a"/>
    <polygon points="324,182 332,185 324,188" fill="#1a4a6a"/>

    <!-- Side dimension -->
    <line x1="360" y1="230" x2="360" y2="370"/>
    <line x1="355" y1="230" x2="365" y2="230"/>
    <line x1="355" y1="370" x2="365" y2="370"/>
    <polygon points="360,238 357,230 363,230" fill="#1a4a6a"/>
    <polygon points="360,362 357,370 363,370" fill="#1a4a6a"/>
  </g>

  <!-- ===== SPARK PARTICLES (floating around) ===== -->

  <g fill="url(#goldGrad)" opacity="0.6">
    <circle cx="170" cy="200" r="1.5" filter="url(#glow)"/>
    <circle cx="345" cy="195" r="1.5" filter="url(#glow)"/>
    <circle cx="165" cy="350" r="1" filter="url(#glow)"/>
    <circle cx="350" cy="355" r="1" filter="url(#glow)"/>
    <circle cx="200" cy="180" r="1"/>
    <circle cx="315" cy="175" r="1"/>
  </g>

  <!-- Spark bursts -->
  <g stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4">
    <line x1="170" y1="196" x2="170" y2="188"/>
    <line x1="166" y1="200" x2="158" y2="200"/>
    <line x1="345" y1="191" x2="345" y2="183"/>
    <line x1="349" y1="195" x2="357" y2="195"/>
  </g>

  <!-- ===== WORDMARK "ARCHITECT" ===== -->

  <g transform="translate(256, 440)">
    <text x="0" y="0" text-anchor="middle" font-family="'SF Mono', 'Consolas', 'Courier New', monospace" font-size="28" font-weight="700" letter-spacing="8" fill="#00d4ff" filter="url(#glow)">ARCHITECT</text>
  </g>

  <!-- Subtle tagline -->
  <g transform="translate(256, 462)" opacity="0.35">
    <text x="0" y="0" text-anchor="middle" font-family="'SF Mono', 'Consolas', 'Courier New', monospace" font-size="9" letter-spacing="4" fill="#8899aa">IDEA → BLUEPRINT</text>
  </g>

  <!-- ===== CORNER DRAFTING MARKS ===== -->

  <g stroke="#1a4a6a" stroke-width="1" opacity="0.3">
    <!-- Top-left corner bracket -->
    <path d="M80,100 L80,80 L100,80" fill="none"/>
    <!-- Top-right corner bracket -->
    <path d="M432,100 L432,80 L412,80" fill="none"/>
    <!-- Bottom-left corner bracket -->
    <path d="M80,412 L80,432 L100,432" fill="none"/>
    <!-- Bottom-right corner bracket -->
    <path d="M432,412 L432,432 L412,432" fill="none"/>
  </g>

  <!-- ===== AMBIENT GLOW ===== -->

  <circle cx="256" cy="290" r="80" fill="url(#cyanGlow)" opacity="0.08"/>

</svg>
